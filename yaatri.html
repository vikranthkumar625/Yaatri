<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaari Booking - NIT Warangal</title>
    <style>
        /* General Page Styling */
       body { 
            font-family: Arial, sans-serif; 
            /* A fresh, academic "Campus Tech" gradient (Blue to Teal) */
            background: linear-gradient(135deg, rgb(52, 230, 233) 0%, #96f4fc 50%, #a2ecdc 100%); 
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .container { 
            width: 100%; 
            max-width: 650px; 
            margin: 0 auto; 
            background: linear-gradient( rgb(106, 77, 203),rgb(205, 192, 220),rgb(117, 83, 176)  );
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(5, 116, 168, 0.2), 0 5px 15px rgba(13, 58, 219, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 { 
            text-align: center; 
            color: #1a2980; 
            margin-top: 0; 
            font-size: 28px;
            letter-spacing: 1px;
        }

        .timer { 
            text-align: center; 
            color: #d32f2f; 
            font-weight: bold; 
            margin-bottom: 25px; 
            font-size: 18px;
            background: #ffebee;
            padding: 8px;
            border-radius: 8px;
        }
        
        /* Layout Wrappers */
        .layout-wrapper { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            margin-bottom: 30px; 
        }

        /* Vehicle Structure */
        .vehicle-container { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 15px; 
            border: 2px solid #e0e0e0; 
            flex-grow: 0; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .driver-area { 
            display: flex; 
            justify-content: flex-end; 
            padding-right: 30px; 
            margin-bottom: 15px; 
            border-bottom: 2px dashed #b0bec5; 
            padding-bottom: 10px; 
        }

        .bus-layout { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }

        /* Seat Styles */
        .seat { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            user-select: none; 
            color: #b0bec5; 
            transition: all 0.2s ease; 
        }

        .seat:not(.booked):hover { 
            transform: scale(1.15); 
            color: #78909c; 
        }
        
        .seat.selected { 
            color: #4CAF50; 
            transform: scale(1.1);
        } 
        
        .seat.booked { 
            color: #ff4c4c !important; 
            cursor: not-allowed; 
            opacity: 0.6; 
        }

        .seat-number { 
            font-size: 14px; 
            font-weight: bold; 
            margin-top: 5px; 
            color: #333; 
        }

        .seat.back-row svg { 
            transform: rotate(180deg); 
        }

        /* Legend Styles */
        .legend-container { 
            background: #ffffff; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #e0e0e0; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .legend-container h4 { 
            margin-top: 0; 
            margin-bottom: 15px; 
            text-align: center; 
            color: #555; 
        }

        .legend-item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 14px; 
            color: #333; 
            font-weight: bold; 
        }

        .legend-icon { 
            width: 30px; 
            height: 30px; 
            margin-right: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .legend-available { color: #b0bec5; }
        .legend-booked { color: #ff4c4c; opacity: 0.6; }
        .legend-selected { color: #4CAF50; }
        
        /* Form Elements */
        .form-group { 
            margin-bottom: 15px; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #444; 
        }

        select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            background-color: #fcfcfc;
            transition: border-color 0.3s ease;
        }
        
        select:focus {
            outline: none;
            border-color: #4364F7;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(to right, #4364F7, #6FB1FC); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
            box-shadow: 0 4px 10px rgba(67, 100, 247, 0.3);
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) { 
            background: linear-gradient(to right, #0052D4, #4364F7); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(67, 100, 247, 0.4);
        }

        button:disabled { cursor: not-allowed; }
        
        /* Step Highlight Box */
        .step-highlight { 
            background: #eef2fd; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #d0dcf7; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loading Yaatri...</h2>
    <div class="timer">Time left to book: <span id="time">10:00</span></div>

    <div class="form-group step-highlight">
        <label for="num-passengers"> Select Number of Passengers</label>
        <select id="num-passengers">
            <option value="">-- Choose --</option>
            <option value="1">1 Passenger</option>
            <option value="2">2 Passengers</option>
            <option value="3">3 Passengers</option>
            <option value="4">4 Passengers</option>
            <option value="5">5 Passengers</option>
            <option value="6">6 Passengers</option>
            <option value="7">7 Passengers</option>
            <option value="8">8 Passengers</option>
        </select>
    </div>

    <label style="text-align: center; margin-bottom: 10px;"> Click on the seats you want</label>
    <div class="layout-wrapper">
        <div class="vehicle-container">
            <div class="driver-area">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#333" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="2"></circle>
                    <line x1="12" y1="12" x2="22" y2="12"></line><line x1="12" y1="12" x2="6" y2="20"></line><line x1="12" y1="12" x2="6" y2="4"></line>
                </svg>
            </div>
            <div class="bus-layout" id="seat-map"></div>
        </div>

        <div class="legend-container">
            <h4>Seat</h4>
            <div class="legend-item"><div class="legend-icon legend-available"><svg viewBox="0 0 24 24" width="25" height="25"><rect x="5" y="2" width="14" height="5" rx="2" fill="currentColor"/><rect x="3" y="8" width="18" height="14" rx="3" fill="currentColor"/></svg></div><span>Available</span></div>
            <div class="legend-item"><div class="legend-icon legend-booked"><svg viewBox="0 0 24 24" width="25" height="25"><rect x="5" y="2" width="14" height="5" rx="2" fill="currentColor"/><rect x="3" y="8" width="18" height="14" rx="3" fill="currentColor"/></svg></div><span>Booked</span></div>
            <div class="legend-item"><div class="legend-icon legend-selected"><svg viewBox="0 0 24 24" width="25" height="25"><rect x="5" y="2" width="14" height="5" rx="2" fill="currentColor"/><rect x="3" y="8" width="18" height="14" rx="3" fill="currentColor"/></svg></div><span>Selected</span></div>
        </div>
    </div> 

    <div class="form-group">
        <label for="boarding"> Boarding Point</label>
        <select id="boarding">
            <option value="">Select Boarding Point</option>
            <option value="maingate">MAIN ENTRANCE</option>
            <option value="Ramappa">Ramappa Residency</option>
            <option value="Kakatiya">Kakatiya Residency</option>
            <option value="Priyadarshini_Sarojini">Priyadarshini and Sarojini</option>
            <option value="Azad">Azad Block</option>
            <option value="Bose">Bose Block</option>
            <option value="Bhabha">Bhabha block</option>
            <option value="ALC">Ambedkar Learning Center (ALC)</option>
            <option value="Taaza">Taaza Tiffins</option>
            <option value="Admin">Administration Building</option>
        </select>
    </div>

    <div class="form-group">
        <label for="dropping"> Dropping Point</label>
        <select id="dropping">
             <option value="">Select Dropping Point</option>
        </select>
    </div>

    <button id="confirm-btn" onclick="bookSeat()">Confirm Booking</button>
</div>
    <script>
    // --- 1. INITIALIZE SUPABASE & DOM ---
    const { createClient } = supabase;
    const supabaseUrl = 'https://sbvltccaagrsxtpqjcix.supabase.co';
    const supabaseKey = 'sb_publishable_lbnUTnmaM0HKgMCH6bqWdA_QvtV8b_C';
    const _supabase = createClient(supabaseUrl, supabaseKey);

    let currentYaatri = 0; 
    const titleElement = document.querySelector('h2');
    const confirmBtn = document.getElementById('confirm-btn') || document.querySelector('button[onclick="bookSeat()"]');
    const timeDisplay = document.getElementById('time');
    const seatMap = document.getElementById('seat-map');
    let selectedSeats = []; 
    const numPassengersSelect = document.getElementById('num-passengers');

    numPassengersSelect.addEventListener('change', () => {
        selectedSeats = [];
        document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
    });

    // --- 2. CREATE SEATS ---
    const chairIcon = `<svg viewBox="0 0 24 24" width="45" height="45"><rect x="5" y="2" width="14" height="5" rx="2" fill="currentColor"/><rect x="3" y="8" width="18" height="14" rx="3" fill="currentColor"/></svg>`;
    for (let i = 1; i <= 8; i++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        if (i === 7 || i === 8) seat.classList.add('back-row');
        seat.innerHTML = `${chairIcon}<span class="seat-number">${i}</span>`;
        seat.onclick = () => selectSeat(seat, i);
        seatMap.appendChild(seat);
    }

    // --- 3. THE CLOCK ENGINE ---
    let endTime = parseInt(localStorage.getItem('yaatriEndTime')) || (Date.now() + 10 * 60 * 1000);
    localStorage.setItem('yaatriEndTime', endTime);

    const timerInterval = setInterval(() => {
        const now = Date.now();
        let distance = endTime - now;

        if (distance <= 0) {
            timeDisplay.innerText = "00:00";
            if (currentYaatri !== 0 && confirmBtn) { 
                confirmBtn.disabled = true;
                confirmBtn.innerText = "Time is up! Waiting for Driver...";
                confirmBtn.style.background = "#555";
                confirmBtn.style.cursor = "not-allowed";
            }
        } else {
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            timeDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }
    }, 1000);

    // --- 4. THE MASTER SYNC ENGINE ---
    async function syncSystem() {
        try {
            // A. Check Cloud State
            const { data: state } = await _supabase.from('vehicle_state').select('*').eq('id', 1).single();
            
            // B. Fetch bookings for active vehicle
            const { data: bookings } = await _supabase.from('bookings').select('seat_numbers').eq('yaatri_id', state.active_yaatri);
            
            let bookedFromCloud = [];
            if (bookings) {
                bookings.forEach(row => {
                    if (row.seat_numbers) {
                        const seats = String(row.seat_numbers).split(',').map(s => parseInt(s.trim()));
                        bookedFromCloud.push(...seats);
                    }
                });
            }

            // --- THE MEMORY TIMER FIX ---
            let distance = endTime - Date.now();
            let savedYaatri = parseInt(localStorage.getItem('savedYaatriNumber')) || 0;

            // If the vehicle number changed (e.g. 1 to 2) OR the vehicle is empty but time is dead -> RESTART!
            if ((state.active_yaatri !== 0 && state.active_yaatri !== savedYaatri) || 
                (bookedFromCloud.length === 0 && distance <= 0 && state.active_yaatri !== 0)) {
                
                endTime = Date.now() + 10 * 60 * 1000;
                localStorage.setItem('yaatriEndTime', endTime);
                localStorage.setItem('savedYaatriNumber', state.active_yaatri); // Memorize the new vehicle!
                distance = endTime - Date.now(); 
            }
            
            currentYaatri = state.active_yaatri;

            // C. TOTAL LOCKDOWN SCENARIO (Both are full)
            if (currentYaatri === 0) {
                titleElement.innerText = "NO VEHICLES AVAILABLE";
                confirmBtn.disabled = true;
                confirmBtn.innerText = "Yaatris are currently driving. Please wait.";
                confirmBtn.style.background = "#555";
                confirmBtn.style.cursor = "not-allowed";
                
                document.querySelectorAll('.seat').forEach(seat => {
                    seat.classList.add('booked');
                    seat.style.color = "#555";
                    seat.onclick = null;
                });
                return; // Stop here!
            }

            // D. NORMAL SCENARIO (A vehicle is available)
            titleElement.innerText = `Book Yaatri ${currentYaatri}`;

            // Paint Seats
            document.querySelectorAll('.seat').forEach((seat, index) => {
                const seatNum = index + 1;
                if (!bookedFromCloud.includes(seatNum)) {
                    seat.classList.remove('booked');
                    seat.style.color = ""; 
                    seat.onclick = () => selectSeat(seat, seatNum);
                } else {
                    seat.classList.remove('selected');
                    seat.classList.add('booked');
                    seat.style.color = ""; 
                    seat.onclick = null;
                    const selIndex = selectedSeats.indexOf(seatNum);
                    if (selIndex > -1) selectedSeats.splice(selIndex, 1);
                }
            });

            // Unlock the button if there is time and space
            if (distance > 0 && bookedFromCloud.length < 8) {
                confirmBtn.disabled = false;
                confirmBtn.innerText = "Confirm Booking";
                confirmBtn.style.background = ""; 
                confirmBtn.style.cursor = "pointer";
            }

            // E. VEHICLE FULL LOGIC
            if (bookedFromCloud.length >= 8) {
                let nextYaatri = 0; 
                if (currentYaatri === 1 && state.y2_available) nextYaatri = 2;
                if (currentYaatri === 2 && state.y1_available) nextYaatri = 1;

                let updates = { active_yaatri: nextYaatri };
                if (currentYaatri === 1) updates.y1_available = false;
                if (currentYaatri === 2) updates.y2_available = false;

                await _supabase.from('vehicle_state').update(updates).eq('id', 1);
                
                if (nextYaatri === 0) {
                    alert(`Yaatri ${currentYaatri} is full! Both vehicles are now driving. Bookings paused.`);
                } else {
                    alert(`Yaatri ${currentYaatri} is full! Switching to Yaatri ${nextYaatri}.`);
                }
                location.reload();
            }

        } catch (err) {
            console.error("Sync error:", err);
        }
    }

    syncSystem();
    setInterval(syncSystem, 3000);

    // --- 5. SEAT SELECTION & BOOKING ---
    function selectSeat(seatElement, seatNumber) {
        const maxPassengers = parseInt(numPassengersSelect.value);
        if (!maxPassengers) return alert("Please select the Number of Passengers from the dropdown first!");

        const seatIndex = selectedSeats.indexOf(seatNumber);
        if (seatIndex > -1) {
            selectedSeats.splice(seatIndex, 1);
            seatElement.classList.remove('selected');
        } else {
            if (selectedSeats.length >= maxPassengers) return alert(`You have only chosen ${maxPassengers} passenger(s). Click a green seat to unselect it first.`);
            selectedSeats.push(seatNumber);
            seatElement.classList.add('selected');
        }
    }

    const boardingSelect = document.getElementById('boarding');
    const droppingSelect = document.getElementById('dropping');
    droppingSelect.innerHTML = boardingSelect.innerHTML;
    droppingSelect.options[0].text = "Select Dropping Point";

    async function bookSeat() {
        if (currentYaatri === 0) return alert("No vehicles available.");
        const maxPassengers = parseInt(numPassengersSelect.value);
        if (!maxPassengers) return alert("Please select the number of passengers.");
        if (selectedSeats.length !== maxPassengers) return alert(`Please select exactly ${maxPassengers} seat(s).`);
        if (boardingSelect.value === "" || droppingSelect.value === "") return alert("Select both points.");

        selectedSeats.sort((a, b) => a - b);
        const seatString = selectedSeats.join(', ');

        try {
            const { error } = await _supabase.from('bookings').insert([
                { yaatri_id: currentYaatri, seat_numbers: seatString, boarding_point: boardingSelect.options[boardingSelect.selectedIndex].text, dropping_point: droppingSelect.options[droppingSelect.selectedIndex].text }
            ]);

            if (error) throw error;
            alert(`Success! Seats ${seatString} booked on Yaatri ${currentYaatri}.`);
            
            syncSystem();
            selectedSeats = []; 
            numPassengersSelect.value = ""; 
        } catch (error) {
            console.error("Supabase Error:", error.message);
        }
    }
</script>
</body>
</html>
