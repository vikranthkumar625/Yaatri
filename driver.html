<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Driver Dashboard - Yaatri</title>
    <style>
    body { font-family: Arial, sans-serif; background-color: #333; color: white; padding: 20px; }
    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("https://electricvehicles.in/wp-content/uploads/2020/03/Indias-first-autonomous-buggy-2.jpg") no-repeat center/cover;
        opacity: 0.4;   
        z-index: -1;
    }
    
    .container { 
        max-width: 800px; 
        margin: 0 auto; 
        background: #222; 
        padding: 20px; 
        border-radius: 10px; 
        border: 1px solid #58a6ff; 
        box-shadow: 0 0 15px rgba(88, 166, 255, 0.4), 0 0 30px rgba(88, 166, 255, 0.2); 
    }

    h1 { 
        text-align: center; 
        color: #58a6ff; 
        border-bottom: 2px solid #58a6ff; 
        padding-bottom: 10px; 
        text-transform: uppercase; 
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(88, 166, 255, 0.5); 
    }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; color: #333; border-radius: 8px; overflow: hidden; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #0056b3; color: white; font-size: 18px; }
    tr:hover { background-color: #f1f1f1; }
    .seat-badge { background: #ff4c4c; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }

    .controls { display: flex; justify-content: space-between; margin-top: 20px; }
    
    button { 
        padding: 12px 20px; 
        border: none; 
        border-radius: 8px; 
        font-size: 16px; 
        cursor: pointer; 
        font-weight: bold; 
        color: white;
        transition: all 0.3s ease; 
    }

    .btn-refresh { 
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
        box-shadow: 0 6px 15px rgba(56, 239, 125, 0.3), inset 0 -3px 0 rgba(0,0,0,0.15); 
    }

    .btn-refresh:hover {
        transform: translateY(-3px); 
        box-shadow: 0 10px 20px rgba(56, 239, 125, 0.5), inset 0 -3px 0 rgba(0,0,0,0.15);
    }

    .btn-clear { 
        background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        box-shadow: 0 6px 15px rgba(255, 65, 108, 0.3), inset 0 -3px 0 rgba(0,0,0,0.15); 
    }

    .btn-clear:hover {
        transform: translateY(-3px); 
        box-shadow: 0 10px 20px rgba(255, 65, 108, 0.5), inset 0 -3px 0 rgba(0,0,0,0.15);
    }

    .empty-msg { text-align: center; padding: 20px; font-size: 18px; color: #aaa; }
    </style>
</head>

<body>

<div class="container">
    <h1 id="driver-title">Yaatri 1 - Driver Route</h1>
    
    <select id="driver-select" onchange="loadBookings()" style="width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; font-weight: bold; background: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer; outline: 2px solid #58a6ff;">
        <option value="1">I am driving Yaatri 1</option>
        <option value="2">I am driving Yaatri 2</option>
    </select>
    
    <div class="controls">
        <button class="btn-refresh" onclick="loadBookings()">🔄 Refresh List</button>
        <button class="btn-clear" onclick="finishTrip()">🏁 Finish Trip (Clear Data)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Seat #</th>
                <th>Pick-Up (Boarding)</th>
                <th>Drop-Off (Destination)</th>
                <th>Time Booked</th>
            </tr>
        </thead>
        <tbody id="passenger-list">
            </tbody>
    </table>
    
    <div id="empty-message" class="empty-msg" style="display: none;">
        No passengers currently booked for this trip.
    </div>
</div>

<script>
    // --- 1. INITIALIZE SUPABASE ---
    const { createClient } = supabase;
    const supabaseUrl = 'https://sbvltccaagrsxtpqjcix.supabase.co';
    const supabaseKey = 'sb_publishable_lbnUTnmaM0HKgMCH6bqWdA_QvtV8b_C';
    const _supabase = createClient(supabaseUrl, supabaseKey);

    // --- 2. FETCH & DISPLAY BOOKINGS FOR SPECIFIC DRIVER ---
    async function loadBookings() {
        try {
            // Find out which Yaatri this driver is looking at from the dropdown
            const myYaatri = parseInt(document.getElementById('driver-select').value);
            document.getElementById('driver-title').innerText = `YAATRI ${myYaatri} - DRIVER ROUTE`;

            // ONLY fetch bookings for this specific driver
            const { data, error } = await _supabase
                .from('bookings')
                .select('*')
                .eq('yaatri_id', myYaatri)
                .order('created_at', { ascending: true });
            
            if (error) throw error;

            const tbody = document.getElementById('passenger-list');
            const emptyMsg = document.getElementById('empty-message');
            
            tbody.innerHTML = ''; // Clear current table

            if (data.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                
                // Add each row to the table
                data.forEach(booking => {
                    const row = document.createElement('tr');
                    
                    const date = new Date(booking.created_at);
                    let hours = date.getHours();
                    let minutes = date.getMinutes();
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12;
                    hours = hours ? hours : 12; 
                    minutes = minutes < 10 ? '0' + minutes : minutes;
                    const timeStr = hours + ':' + minutes + ' ' + ampm;

                    row.innerHTML = `
                        <td><span class="seat-badge">Seats: ${booking.seat_numbers}</span></td>
                        <td><strong>${booking.boarding_point}</strong></td>
                        <td><strong>${booking.dropping_point}</strong></td>
                        <td>${timeStr}</td>
                    `;
                    tbody.appendChild(row);
                });
            }
        } catch (error) {
            console.error("Error loading bookings:", error);
        }
    }

    // --- 3. FINISH TRIP (CLEAR DATA & UNLOCK BOOKINGS) ---
    async function finishTrip() {
        if (!confirm("Are you sure you want to finish this trip and clear your passengers?")) return;
        
        const myYaatri = parseInt(document.getElementById('driver-select').value);

        try {
            // 1. Delete ONLY this specific driver's passengers (Leaves the other vehicle alone!)
            const { error: deleteError } = await _supabase.from('bookings').delete().eq('yaatri_id', myYaatri); 
            if (deleteError) throw deleteError;
            
            // 2. Tell the cloud this specific vehicle is back and available!
            const { data: state, error: stateError } = await _supabase.from('vehicle_state').select('*').eq('id', 1).single();
            if (stateError) throw stateError;

            let updates = {};
            if (myYaatri === 1) updates.y1_available = true;
            if (myYaatri === 2) updates.y2_available = true;

            // 3. If the whole system was locked out (0), open it back up to this returning vehicle!
            if (state.active_yaatri === 0) {
                updates.active_yaatri = myYaatri; 
            }

            const { error: updateError } = await _supabase.from('vehicle_state').update(updates).eq('id', 1);
            if (updateError) throw updateError;
            
            alert(`Trip finished! Yaatri ${myYaatri} is now empty and accepting new bookings.`);
            
            // Refresh driver screen
            loadBookings(); 
            
        } catch (error) {
            console.error("Error clearing data:", error.message);
            alert("Could not clear data.");
        }
    }

    // --- 4. INITIAL LOAD & REAL-TIME SYNC ---
    loadBookings();

    // Force the driver's screen to refresh data every 3 seconds!
    setInterval(loadBookings, 3000);
</script>

</body>
</html>
